version: "3.9"

services:
  api:
    build: .
    container_name: par30_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

    volumes:
      - ./models:/app/models   # persist trained models
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: par30_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  cron:
    image: python:3.10-slim
    container_name: par30_cron
    depends_on:
      - api
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./cronjob:/etc/cron.d/monthly
    working_dir: /app
    restart: unless-stopped
    command: >
      sh -c "
      apt-get update &&
      apt-get install -y cron curl &&
      touch /app/logs/cron.log &&
      chmod +x /app/app/run_monthly.sh &&
      echo 'SHELL=/bin/bash' > /etc/cron.d/monthly &&
      echo 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin' >> /etc/cron.d/monthly &&
      echo '0 0 1 * * bash /app/app/run_monthly.sh >> /app/logs/cron.log 2>&1' >> /etc/cron.d/monthly &&
      chmod 0644 /etc/cron.d/monthly &&
      crontab /etc/cron.d/monthly || true &&
      cron -f
      "

volumes:
  postgres_data: